<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Editar empleada</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--brand-font:'Cormorant Garamond', serif;}
html,body,input,select,textarea,button,table,th,td,a,label,span,div,p,h1,h2,h3,h4,h5,h6{font-family:var(--brand-font) !important;letter-spacing:.01em;color:#442a37;}
body{font-size:1.08rem;line-height:1.45;}
input,select,textarea,button,a,th,td,label,p{font-size:1.08rem !important;}

*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Cormorant Garamond', serif;background:#fff0f5;padding:20px}.card{max-width:520px;margin:40px auto;background:white;padding:28px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.08)}h1{color:#b74474;margin-bottom:18px;text-align:center}label{display:block;margin:10px 0 6px;color:#b74474;font-weight:700}input,select{width:100%;padding:12px;border:2px solid #f3a6bf;border-radius:12px}button,a{display:inline-block;margin-top:16px;padding:12px 18px;border-radius:12px;text-decoration:none;border:none;font-weight:700;cursor:pointer}button{background:#d25b8d;color:white}a{background:#eee;color:#555;margin-left:8px}</style></head>
<body><div class="card"><h1>Modificar empleada</h1><form method="POST"><label>Nombre</label><input type="text" name="nombre" value="{{ empleada['nombre'] }}" required><label>Contraseña</label><input type="text" name="password" value="{{ empleada['password'] }}"><label>Rol</label><select name="rol"><option value="empleada" {% if empleada['rol']=='empleada' %}selected{% endif %}>empleada</option><option value="admin" {% if empleada['rol']=='admin' %}selected{% endif %}>admin</option></select><button type="submit">Guardar cambios</button><a href="{{ url_for('admin_panel') }}">Cancelar</a></form></div></body></html>
