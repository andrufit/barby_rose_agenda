<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clientas</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{--brand-font:'Cormorant Garamond', serif;}
html,body,input,select,textarea,button,table,th,td,a,label,span,div,p,h1,h2,h3,h4,h5,h6{font-family:var(--brand-font) !important;letter-spacing:.01em;color:#442a37;}
body{font-size:1.08rem;line-height:1.45;}
input,select,textarea,button,a,th,td,label,p{font-size:1.08rem !important;}



body{
font-family:Poppins;
background:#fff0f6;
padding:30px;
}

.container{
max-width:800px;
margin:auto;
}

h1{
text-align:center;
color:#e91e63;
margin-bottom:20px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:25px;
}

form{
display:flex;
gap:10px;
flex-wrap:wrap;
}

input{
padding:10px;
border-radius:8px;
border:1px solid #ddd;
flex:1;
}

button{
background:#ff4d88;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#e6005c;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#ff4d88;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

tr:hover{
background:#fff5f8;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#e91e63;
font-weight:bold;
}

</style>

</head>
<body>

<div class="container">

<h1>Clientas</h1>

<a class="back" href="{{ url_for('admin_panel') }}">← Volver</a>

<div class="card">

<h3>Agregar Clienta</h3>

<form method="POST">

<input name="nombre" placeholder="Nombre de la clienta" required>

<input name="telefono" placeholder="Teléfono">

<button type="submit">Guardar</button>

</form>

</div>

<div class="card">

<h3>Lista de Clientas</h3>

<table>

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Teléfono</th>
</tr>

{% for c in clientas %}

<tr>

<td>{{ c["id"] }}</td>

<td>{{ c["nombre"] }}</td>

<td>{{ c["telefono"] }}</td>

</tr>

{% endfor %}

</table>

</div>

</div>

</body>
</html>
