<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Barby Rose Nail Spa</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--brand-font:'Cormorant Garamond', serif;}
html,body,input,select,textarea,button,table,th,td,a,label,span,div,p,h1,h2,h3,h4,h5,h6{font-family:var(--brand-font) !important;letter-spacing:.01em;color:#442a37;}
body{font-size:1.08rem;line-height:1.45;}
input,select,textarea,button,a,th,td,label,p{font-size:1.08rem !important;}


*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cormorant Garamond', serif;min-height:100vh;background:linear-gradient(rgba(255,240,245,.92),rgba(255,240,245,.92)),url("{{ url_for('static', filename='local.jpg') }}") center/cover no-repeat;display:flex;justify-content:center;align-items:center;padding:20px}
.login-container{background:rgba(255,255,255,.96);padding:36px;border-radius:24px;box-shadow:0 14px 40px rgba(0,0,0,.12);max-width:430px;width:100%;text-align:center}.logo{max-width:290px;width:100%;margin:0 auto 16px;display:block}
h2{font-family:'Cormorant Garamond',serif;color:#d25b8d;font-size:2.9rem;line-height:1;margin-bottom:18px;font-weight:700}.sub{color:#5c3948;margin-bottom:22px}
form{display:flex;flex-direction:column;gap:8px;text-align:left}label{color:#b74474;font-weight:700}input{padding:13px 15px;margin-bottom:10px;border:2px solid #f3a6bf;border-radius:12px;font-size:1.08rem;outline:none}input:focus{border-color:#b74474;box-shadow:0 0 0 4px rgba(231,84,128,.12)}button{margin-top:8px;background:#d25b8d;color:white;border:none;padding:14px;border-radius:12px;font-weight:700;font-size:1.15rem;cursor:pointer}button:hover{background:#b74474}
</style>
</head>
<body>
<div class="login-container">
<img class="logo" src="{{ url_for('static', filename='logo.png') }}" alt="Barby Rose Nail Spa">
<h2>Iniciar sesión</h2>
<div class="sub">Panel interno de citas y recordatorios</div>
<form method="POST">
<label>Usuario:</label><input type="text" name="nombre" required>
<label>Contraseña:</label><input type="password" name="password" required>
<button type="submit">Entrar</button>
</form>
</div>
</body>
</html>
